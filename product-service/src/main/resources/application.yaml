spring:
  application:
    name: order-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  http:
    converters:
      preferred-json-mapper: jackson2
  jackson:
    write:
      date-timestamps: false
    find-and-add-modules: true
server:
  # 启用虚拟线程 (Spring Boot 3.2+ / JDK 21+)
  threads:
    virtual:
      enabled: true

