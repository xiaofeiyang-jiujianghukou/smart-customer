version: "3.9"

services:

  # ========================
  # MySQL
  # ========================
  mysql:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/mysql:8.0
    container_name: smart-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT_EXTERNAL}:${MYSQL_PORT_INTERNAL}"
    volumes:
      - ./db/data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - smart-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # ========================
  # Redis
  # ========================
  redis:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/redis:7
    container_name: smart-redis
    restart: always
    ports:
      - "${REDIS_PORT_EXTERNAL}:${REDIS_PORT_INTERNAL}"
    networks:
      - smart-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ========================
  # Order Service
  # ========================
  order-service:
    build: ./order-service
    container_name: order-service
    restart: always
    ports:
      - "${ORDER_PORT_EXTERNAL}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT_INTERNAL}
      MYSQL_DB: ${MYSQL_DATABASE}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT_INTERNAL}
      MAVEN_REPO_CONTAINER: ${MAVEN_REPO_CONTAINER}
      MAVEN_SETTINGS_CONTAINER: ${MAVEN_SETTINGS_CONTAINER}
    volumes:
      - ${MAVEN_REPO_HOST}:${MAVEN_REPO_CONTAINER}  # 本地 Maven 仓库
      - ${MAVEN_SETTINGS_HOST}:${MAVEN_SETTINGS_CONTAINER}  # 自定义 settings.xml
    networks:
      - smart-network

  # ========================
  # Product Service
  # ========================
  product-service:
    build: ./product-service
    container_name: product-service
    restart: always
    ports:
      - "${PRODUCT_PORT_EXTERNAL}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT_INTERNAL}
      MYSQL_DB: ${MYSQL_DATABASE}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MAVEN_REPO_CONTAINER: ${MAVEN_REPO_CONTAINER}
      MAVEN_SETTINGS_CONTAINER: ${MAVEN_SETTINGS_CONTAINER}
    volumes:
      - ${MAVEN_REPO_HOST}:${MAVEN_REPO_CONTAINER}  # 本地 Maven 仓库
      - ${MAVEN_SETTINGS_HOST}:${MAVEN_SETTINGS_CONTAINER}  # 自定义 settings.xml
    networks:
      - smart-network

  # ========================
  # AI Agent
  # ========================
  agent-customer:
    build: ./agent-customer
    container_name: agent-customer
    restart: always
    ports:
      - "${AGENT_PORT_EXTERNAL}:8080"
    depends_on:
      order-service:
        condition: service_started
      product-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      LLM_MODEL_API_KEY: ${LLM_MODEL_API_KEY}
      LLM_MODEL_BASE_URL: ${LLM_MODEL_BASE_URL}
      ORDER_SERVICE_URL: http://order-service:8080
      PRODUCT_SERVICE_URL: http://product-service:8080
      MAVEN_REPO_CONTAINER: ${MAVEN_REPO_CONTAINER}
      MAVEN_SETTINGS_CONTAINER: ${MAVEN_SETTINGS_CONTAINER}
    volumes:
      - ${MAVEN_REPO_HOST}:${MAVEN_REPO_CONTAINER}  # 本地 Maven 仓库
      - ${MAVEN_SETTINGS_HOST}:${MAVEN_SETTINGS_CONTAINER}  # 自定义 settings.xml
    networks:
      - smart-network

# ========================
# Network
# ========================
networks:
  smart-network:
    driver: bridge