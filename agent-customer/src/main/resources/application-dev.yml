# Redis 配置 (使用 Lettuce 连接池)
data:
  redis:
    host: 127.0.0.1 # 指向 docker-compose 中的服务名
    port: 6379
    password:
    timeout: 5000ms
    # Lettuce 连接池配置 (依赖 commons-pool2)
    lettuce:
      pool:
        max-active: 16   # 最大连接数 (根据并发量调整，虚拟线程可适当调大)
        max-idle: 8      # 最大空闲连接
        min-idle: 2      # 最小空闲连接 (保持少量长连接，避免冷启动延迟)
        max-wait: -1ms   # 获取连接最大等待时间 (-1 表示无限等待，防止报错)
      clustering:
        refresh:
          adaptive: true # 集群模式自适应刷新 (单机可忽略)

# 日志配置 (可选)
logging:
  level:
    com.truejarvis: DEBUG
    com.baomidou.mybatisplus: DEBUG

springdoc:
  # API 文档路径 (默认 /v3/api-docs)
  api-docs:
    path: /v3/api-docs
  # Swagger UI 路径 (默认 /swagger-ui.html -> 重定向到 /swagger-ui/index.html)
  swagger-ui:
    path: /swagger-ui.html
    enabled: true # 开发环境开启
    operations-sorter: alpha # 按字母顺序排序接口
    tags-sorter: alpha
    # 尝试将 Swagger UI 请求映射到后端 API (解决部分网关代理问题)
    url: /v3/api-docs

  # 分组显示 (可选，用于区分不同模块)
  group-configs:
    - group: "core-api"
      paths-to-match: "/**"
      packages-to-scan: "com.ai.agent.customer.controller"


llm:
  model:
    name: deepseek-chat
    apiKey: sk-xxxxxxxxxxxxxxxxxxxxxxx
    baseUrl: https://api.deepseek.com/chat/completions

app:
  jackson:
    pretty-print: true